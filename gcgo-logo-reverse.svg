<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Dark background pill -->
  <rect width="400" height="300" rx="16" fill="#0a1628"/>

  <!-- HEART SHAPE - teal fill faint -->
  <path d="M200,240 C200,240 80,160 80,100 C80,65 108,42 140,42 C162,42 183,55 200,72 C217,55 238,42 260,42 C292,42 320,65 320,100 C320,160 200,240 200,240 Z"
    fill="#0D9B7A" opacity="0.18" />

  <!-- CROSS outline in white -->
  <rect x="183" y="68" width="34" height="110" rx="6"
    fill="none" stroke="#ffffff" stroke-width="7"/>
  <rect x="145" y="106" width="110" height="34" rx="6"
    fill="none" stroke="#ffffff" stroke-width="7"/>

  <!-- HEARTBEAT / PULSE LINE in teal -->
  <polyline
    points="155,123 168,123 176,100 184,146 192,108 200,123 213,123 221,108 229,138 237,123 245,123"
    fill="none" stroke="#0D9B7A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- GCGO text in white -->
  <text x="200" y="268"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="42"
    font-weight="900"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="6">GCGO</text>

  <!-- Tagline in teal -->
  <text x="200" y="290"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="11"
    font-weight="500"
    fill="#0D9B7A"
    text-anchor="middle"
    letter-spacing="3">HEALTHCARE CONSULTING SERVICES</text>
</svg>
